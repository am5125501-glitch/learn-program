<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SIGNATURE | الهوية الفضاءية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #9d4edd; --neon: #e0aaff; --bg: #030006; --glass: rgba(255, 255, 255, 0.05); }
        body { background: radial-gradient(circle at center, #1a0033 0%, #030006 100%); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; cursor: none; }
        
        /* مؤشر الماوس الفخم */
        .cursor { width: 30px; height: 30px; border: 2px solid var(--purple); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; box-shadow: 0 0 20px var(--purple); transition: 0.1s; backdrop-filter: invert(1); }

        /* اسم الشركة المنور */
        .neon-title { 
            font-size: 6rem; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px var(--purple), 0 0 80px var(--purple);
            animation: flicker 2s infinite alternate;
        }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

        /* زرار الواتساب */
        .wa-float { position: fixed; bottom: 40px; right: 40px; background: var(--purple); padding: 20px 40px; border-radius: 50px; color: #fff; text-decoration: none; box-shadow: 0 0 30px var(--purple); font-weight: 900; z-index: 2000; transition: 0.4s; }
        .wa-float:hover { transform: scale(1.1); box-shadow: 0 0 50px var(--purple); background: #7b2cbf; }

        nav { display: flex; justify-content: center; gap: 50px; padding: 40px; }
        nav a { color: #fff; cursor: pointer; font-weight: 700; font-size: 1.2rem; transition: 0.3s; padding: 10px 20px; border-radius: 15px; }
        nav a:hover { background: rgba(157, 78, 221, 0.2); box-shadow: 0 0 15px var(--purple); }

        .page { display: none; padding: 100px 20px; text-align: center; animation: fadeIn 1s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: auto; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; overflow: hidden; transition: 0.5s; }
        .card:hover { transform: translateY(-20px) scale(1.02); border-color: var(--purple); box-shadow: 0 20px 50px rgba(157, 78, 221, 0.4); }
        .img-box { width: 100%; height: 250px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.1); filter: brightness(1.2); }
        .card h3 { color: var(--purple); padding: 20px; margin: 0; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <a href="https://wa.me/201096864590" class="wa-float" target="_blank">استشرنا الآن</a>

    <nav>
        <a onclick="show('home')">الرئيسية</a>
        <a onclick="show('about')">من نحن</a>
        <a onclick="show('services')">خدماتنا</a>
    </nav>

    <div id="home" class="page active">
        <h1 class="neon-title">SIGNATURE</h1>
        <p style="font-size: 1.5rem; letter-spacing: 5px; color: var(--neon);">السيطرة المطلقة على السوق الرقمي</p>
    </div>

    <div id="about" class="page">
        <h2 style="font-size: 3rem;">كيان يغير القواعد</h2>
        <p style="font-size: 1.2rem; max-width: 600px; margin: auto; line-height: 2;">نحن لا نقدم خدمات، نحن نصنع صدمة إبداعية في سوقك التنافسي.</p>
    </div>

    <div id="services" class="page">
        <div class="grid">
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?1"></div><h3>تصوير محتوى الفيديو</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?2"></div><h3>تعديل الفيديوهات</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?3"></div><h3>إنشاء المحتوى</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?4"></div><h3>التصميمات</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?5"></div><h3>بناء استراتيجية</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?6"></div><h3>براندينج (Branding)</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?7"></div><h3>تسويق إلكتروني</h3></div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX - 15 + 'px';
            c.style.top = e.clientY - 15 + 'px';
        });
    </script>
</body>
</html>
