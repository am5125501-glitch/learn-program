<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SIGNATURE | الهوية الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #9d4edd; --bg: #030006; --glass: rgba(255, 255, 255, 0.05); }
        body { background: radial-gradient(circle at center, #1a0033 0%, #030006 100%); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; cursor: none; }
        .cursor { width: 25px; height: 25px; border: 2px solid var(--purple); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; box-shadow: 0 0 15px var(--purple); transition: 0.1s; }
        
        /* زرار الواتساب العائم */
        .wa-float { position: fixed; bottom: 40px; right: 40px; background: var(--purple); padding: 18px 35px; border-radius: 50px; color: #fff; text-decoration: none; box-shadow: 0 0 25px var(--purple); font-weight: 900; z-index: 2000; transition: 0.3s; }
        .wa-float:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--purple); }

        nav { display: flex; justify-content: center; gap: 40px; padding: 30px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fff; cursor: pointer; font-weight: bold; transition: 0.3s; padding: 10px 20px; border-radius: 10px; }
        nav a:hover { background: var(--purple); box-shadow: 0 0 20px var(--purple); }

        .page { display: none; padding: 80px 20px; text-align: center; }
        .active { display: block; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; transition: 0.5s; }
        .card:hover { transform: translateY(-10px); border-color: var(--purple); box-shadow: 0 10px 30px rgba(157, 78, 221, 0.3); }
        .img-box { width: 100%; height: 220px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        .card h3 { color: var(--purple); padding: 15px; margin: 0; }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <a href="https://wa.me/20196864590" class="wa-float" target="_blank">استشرنا الآن</a>

    <nav>
        <a onclick="show('home')">الرئيسية</a>
        <a onclick="show('about')">من نحن</a>
        <a onclick="show('services')">خدماتنا</a>
    </nav>

    <div id="home" class="page active">
        <h1 style="font-size: 5rem; color: var(--purple);">SIGNATURE</h1>
        <p>السيطرة المطلقة على السوق الرقمي العالمي</p>
    </div>

    <div id="about" class="page">
        <h2>من نحن</h2>
        <p>وكالة إبداعية متكاملة نصمم هويتك الرقمية بأعلى معايير الابتكار.</p>
    </div>

    <div id="services" class="page">
        <div class="grid">
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?1"></div><h3>تصوير محتوى الفيديو</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?2"></div><h3>تعديل الفيديوهات</h3></div>
            <div class="card"><div class="img-box"><img src="https://picsum.photos/400/300?3"></div><h3>إنشاء المحتوى</h3></div>
            <div class="card"><div class="img-box"><img src="https://images.unsplash.com/photo-1626785774573-4b799315347d"></div><h3>التصميمات</h3></div>
            <div class="card"><div class="img-box"><img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f"></div><h3>بناء استراتيجية</h3></div>
            <div class="card"><div class="img-box"><img src="https://images.unsplash.com/photo-1557804506-669a67965ba0"></div><h3>براندينج (Branding)</h3></div>
            <div class="card"><div class="img-box"><img src="https://images.unsplash.com/photo-1563986768609-322da13575f3"></div><h3>تسويق إلكتروني</h3></div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX - 12 + 'px';
            c.style.top = e.clientY - 12 + 'px';
        });
    </script>
</body>
</html>
